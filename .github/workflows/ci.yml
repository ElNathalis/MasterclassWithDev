name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
      - uat
      - qa
  pull_request:
    branches:
      - main
      - master
      - develop
      - dev
      - uat
      - qa

env:
  APP_ENV: testing

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, fileinfo, json, mbstring, pdo, sqlite, pdo_sqlite, tokenizer, xml
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.ci .env
          php artisan key:generate

      - name: Run tests with coverage
        run: php artisan test --coverage --min=50

      - name: PHPStan (Larastan) static analysis
        run: vendor/bin/phpstan analyse --error-format=github

      - name: Linting (Laravel Pint)
        run: |
          LONG_LIVED="main master develop dev uat qa"
          CURRENT_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          if echo "$LONG_LIVED" | grep -qw "$CURRENT_BRANCH"; then
            echo "Running Pint in test mode (no fixes)"
            ./vendor/bin/pint --test --preset=psr12
          else
            echo "Running Pint with auto-fix"
            ./vendor/bin/pint --preset=psr12
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git diff --quiet && git diff --staged --quiet || git commit -m "Apply Pint auto-formatting"
            git push
          fi

  simulate-deploy-dev-uat:
    needs: test-and-analyze
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/uat' || github.ref == 'refs/heads/qa')
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine environment
        id: env
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          case "$BRANCH" in
            develop|dev)
              echo "file=.env.dev" >> $GITHUB_OUTPUT
              echo "name=dev" >> $GITHUB_OUTPUT
              ;;
            uat|qa)
              echo "file=.env.uat" >> $GITHUB_OUTPUT
              echo "name=uat" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Simulate deployment
        run: |
          cp ${{ steps.env.outputs.file }} .env
          echo "Deploying to ${{ steps.env.outputs.name }} with ${{ steps.env.outputs.file }}"
          sleep 5
          echo "Deployment simulation completed successfully"

  simulate-deploy-prod:
    needs: test-and-analyze
    runs-on: ubuntu-latest
    environment: production
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate deployment to production
        run: |
          cp .env.prod .env
          echo "Deploying to prod with .env.prod"
          sleep 5
          echo "Production deployment simulation completed"

  notify-maintainers:
    needs: [test-and-analyze, simulate-deploy-dev-uat, simulate-deploy-prod]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify maintainers
        uses: actions/github-script@v6
        with:
          script: |
            const testStatus = '${{ needs.test-and-analyze.result }}';
            const devUatStatus = '${{ needs.simulate-deploy-dev-uat.result }}';
            const prodStatus = '${{ needs.simulate-deploy-prod.result }}';
            let message = `Pipeline results:\n- Tests & analysis: ${testStatus}\n- Dev/UAT deploy: ${devUatStatus}\n- Prod deploy: ${prodStatus}`;
            if (testStatus !== 'success' || devUatStatus === 'failure' || prodStatus === 'failure') {
              message += '\n❌ Some stage failed. Check logs.';
            } else {
              message += '\n✅ All stages passed successfully.';
            }
            const maintainers = (process.env.MAINTAINERS || '').split(',').filter(m => m.trim());
            if (maintainers.length === 0) {
              console.log('No maintainers specified, skipping notification');
              return;
            }
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `@${maintainers.join(', @')} ${message}`
            });
        env:
          MAINTAINERS: ${{ secrets.MAINTAINERS }}